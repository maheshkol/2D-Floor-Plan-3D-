<script>
console.log("🚀 3D VIEW LOADED");

// -----------------------------
// DATA
// -----------------------------
const sceneData = __SCENE_DATA__;
console.log("Scene Data:", sceneData);

// -----------------------------
// SCENE
// -----------------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f5);

// -----------------------------
// CAMERA
// -----------------------------
const camera = new THREE.PerspectiveCamera(75, 800/600, 0.1, 1000);
camera.position.set(20, 30, 40);
camera.lookAt(0, 0, 0);

// -----------------------------
// RENDERER
// -----------------------------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(800, 600);
document.body.appendChild(renderer.domElement);

// -----------------------------
// MOUSE ROTATION (FIXED ✅)
// -----------------------------
let isDragging = false;
let prevMouse = { x: 0, y: 0 };

renderer.domElement.addEventListener("mousedown", (e) => {
    isDragging = true;
    prevMouse = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener("mouseup", () => {
    isDragging = false;
});

renderer.domElement.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;

    scene.rotation.y += dx * 0.01;
    scene.rotation.x += dy * 0.01;

    prevMouse = { x: e.clientX, y: e.clientY };
});

// -----------------------------
// ZOOM
// -----------------------------
renderer.domElement.addEventListener("wheel", (e) => {
    camera.position.z += e.deltaY * 0.01;
});

// -----------------------------
// LIGHTING
// -----------------------------
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(20, 20, 20);
scene.add(dirLight);

// -----------------------------
// GRID + AXES
// -----------------------------
scene.add(new THREE.GridHelper(100, 100));
scene.add(new THREE.AxesHelper(5));

// -----------------------------
// SCALE
// -----------------------------
const SCALE = 0.5;

// -----------------------------
// DRAW WALLS (FIXED GEOMETRY ✅)
// -----------------------------
if (sceneData && sceneData.walls) {

    console.log("Walls:", sceneData.walls.length);

    sceneData.walls.forEach(w => {

        const pos = w.position || [0,0,0];
        const dim = w.dimensions || [5,0.3,3];
        const rot = w.rotation || [0,0,0];

        const length = dim[0] * SCALE;
        const thickness = Math.max(dim[1] * SCALE, 0.3);
        const height = dim[2] * SCALE;

        const geometry = new THREE.BoxGeometry(length, height, thickness);

        const material = new THREE.MeshStandardMaterial({
            color: 0x0077ff
        });

        const wall = new THREE.Mesh(geometry, material);

        // ✅ CORRECT AXIS MAPPING
        wall.position.set(
            pos[0] * SCALE,
            height / 2,
            pos[1] * SCALE
        );

        // ✅ CORRECT ROTATION
        wall.rotation.y = -rot[2];

        scene.add(wall);
    });

} else {
    console.warn("No walls found");
}

// -----------------------------
// TEST CUBE
// -----------------------------
const cube = new THREE.Mesh(
    new THREE.BoxGeometry(2,2,2),
    new THREE.MeshBasicMaterial({ color: 0xff0000 })
);
cube.position.set(0,1,0);
scene.add(cube);

// -----------------------------
// ANIMATION
// -----------------------------
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

animate();

console.log("✅ RENDER LOOP STARTED");
</script>
